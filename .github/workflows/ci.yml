name: CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "assignments/**"
      - ".github/workflows/ci.yml"
      - "scripts/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "assignments/**"
      - ".github/workflows/ci.yml"
      - "scripts/**"

jobs:
  discover-assignments:
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.discover.outputs.list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover assignment directories
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          json="["
          first=1

          while IFS= read -r dir; do
            if [ -f "$dir/package.json" ]; then
              if [ "$first" -eq 0 ]; then
                json="$json,"
              fi
              json="$json\"$dir\""
              first=0
            fi
          done < <(find assignments -mindepth 1 -maxdepth 1 -type d | sort)

          json="$json]"
          echo "list=$json" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest
    needs: discover-assignments
    if: ${{ needs.discover-assignments.outputs.list != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        assignment: ${{ fromJson(needs.discover-assignments.outputs.list) }}
    defaults:
      run:
        working-directory: ${{ matrix.assignment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.assignment }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
